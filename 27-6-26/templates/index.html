<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Location Finder</title>


    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        label {
            font-weight: bold;
            margin-right: 5px;
        }

        input[type="text"] {
            flex: 1;
            min-width: 250px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        .error {
            color: #d9534f;
            background: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .result-info {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .result-info p {
            margin: 5px 0;
            font-size: 16px;
        }

        .result-info strong {
            color: #333;
        }

        #mapContainer {
            width: 100%;
            height: 500px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🗺️ Location Finder</h1>
        <form method="POST" action="/">
            <label for="location">Enter a place:</label>
            <input type="text" id="location" name="location" placeholder="e.g., Paris, Eiffel Tower, Tokyo"
                value="{{ request.form.get('location', '') }}" required>
            <button type="submit">Search</button>
        </form>


        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}


        {% if data %}
        <div class="result-info">
            <p><strong>Location:</strong> {{ data.name }}</p>
            <p><strong>Latitude:</strong> {{ data.latitude }}</p>
            <p><strong>Longitude:</strong> {{ data.longitude }}</p>
        </div>
        {% endif %}


        <!-- Map container with data attributes for coordinates -->
        <div id="mapContainer" data-lat="{{ data.latitude if data else '' }}"
            data-lon="{{ data.longitude if data else '' }}">
        </div>
    </div>


    <script>
        (function () {
            const container = document.getElementById('mapContainer');
            const latStr = container.dataset.lat;
            const lonStr = container.dataset.lon;


            // Default view (centered roughly on the world)
            let lat = 20.5937, lon = 78.9629, zoom = 4;


            if (latStr && lonStr) {
                lat = parseFloat(latStr);
                lon = parseFloat(lonStr);
                zoom = 12;  // closer zoom when we have a location
            }


            // Initialize the map
            const map = L.map('mapContainer').setView([lat, lon], zoom);


            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);


            // If we have coordinates, place a marker
            if (latStr && lonStr) {
                L.marker([lat, lon]).addTo(map)
                    .bindPopup('📍 Searched location')
                    .openPopup();
            }
        })();
    </script>
</body>

</html>
