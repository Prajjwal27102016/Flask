<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f4f4f9;
        }

        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e2e3e5;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>BMI Calculator</h2>
        <form method="POST">
            <div class="form-group">
                <label for="weight">Weight (kg):</label>
                <input type="number" step="0.1" min="0" name="weight" id="weight" value="{{ weight }}" required>
            </div>
            <div class="form-group">
                <label for="height">Height (meters):</label>
                <input type="number" step="0.01" min="0" name="height" id="height" value="{{ height }}" required>
            </div>
            <button type="submit">Calculate BMI</button>
        </form>

        {% if category %}
        <div class="result">
            {% if bmi is not none %}
            <p><strong>Your BMI:</strong> {{ bmi }}</p>
            {% endif %}
            <p><strong>Category:</strong> {{ category }}</p>
        </div>
        {% endif %}
    </div>

</body>

</html>
